<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Conversor de Moedas</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <h1>Conversor de Moedas</h1>

  <div class="conversor">

    <div class="campo">
      <label>Valor</label>
      <input type="number" placeholder="Digite o valor">
    </div>

    <div class="campo">
      <label>De</label>
      <select>
        <option>BRL - Real</option>
        <option>USD - Dólar</option>
        <option>EUR - Euro</option>
      </select>
    </div>

    <div class="campo">
      <label>Para</label>
      <select>
        <option>USD - Dólar</option>
        <option>BRL - Real</option>
        <option>EUR - Euro</option>
      </select>
    </div>

    <button>Converter</button>

    <div class="resultado">
      Resultado: 0.00
    </div>

  </div>
</div>

</body>
</html>
