<!DOCTYPE html>
<html lang="PT_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Semântica em Html! </title>
</head>
<body>


<!--Tags Semânticas em html
1 - Dar significado;
2 - Elmentos.-->

<header> — cabeçalho da página ou seção;
<nav> — área de navegação com links;
<main> — conteúdo principal da página;
<section> — agrupa conteúdos relacionados;
<article> — conteúdo independente (post, notícia, produto);
<aside> — conteúdo complementar (barra lateral);
<footer> — rodapé da página ou seção;
<figure> — agrupa mídia (imagem, gráfico, etc.);
<figcaption> — legenda de uma mídia;
<strong> — indica importância forte;
<em> — indica ênfase;
<mark> — destaca parte do texto;
<time> — representa data ou horário;
<address> — informações de contato;
<details> — cria conteúdo expansível;
<summary> — título do <details>.
    
</body>
</html>
