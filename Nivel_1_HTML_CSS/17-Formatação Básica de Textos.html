<!DOCTYPE html>
<html lang="PT_BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1Formatação Básica de Textos em html! </title>
</head>
<body>
    
<!--Formatações Básicas: 
 - Strong (mportância/negrito);
 - em (enfase);
 - mark (relevancia); e
 - s (riscar). 
-->

<p><strong>Lorem ipsum dolor sit</strong>, amet consectetur adipisicing elit. <em>Eos ipsam molestias, ab porro doloribus accusamus repudiandae praesentium nesciunt!</em> <mark>Recusandae ipsa neque voluptatem reprehenderit quasi nobis molestias,</mark>, <s>possimus odit tempora atque.</s></p>

</body>
</html>
